<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to the Airawat member portal.">
  <title>Member Login — Airawat</title>
  <link rel="icon" type="image/png" href="images/header/Airawat%20Logo.png">
  <link rel="apple-touch-icon" href="images/header/Airawat%20Logo.png">
  <meta name="theme-color" content="#060709">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/modern.css">
</head>
<body class="loading" data-page="">
  <div class="preloader" id="preloader">
    <div class="preloader__inner">
      <img class="preloader__logo" src="images/header/Airawat%20Logo.png" alt="">
      <div class="preloader__count"><span class="n">0</span><span class="pct">%</span></div>
      <div class="preloader__bar"><i></i></div>
    </div>
  </div>
  <div id="site-header"></div>
  <main>

    <!-- ===== PAGE HEAD ===== -->
    <section class="page-head" data-hero>
      <div class="wrap">
        <nav class="breadcrumb" aria-label="Breadcrumb"><a href="index.html">Home</a> <span>/</span> Login</nav>
        <h1 class="page-title"><span class="line"><span>Member</span></span> <span class="line"><span><em class="serif grad">login</em></span></span></h1>
        <p class="lead" data-hero-fade style="margin-top:28px;max-width:60ch">Secure access for Airawat members and
          partners. Sign in to reach the member portal — research workspaces, project dashboards and shared resources.</p>
      </div>
    </section>

    <!-- ===== LOGIN CARD ===== -->
    <div class="tone tone-light"><section class="section wrap">
      <div class="card" data-reveal style="max-width:440px;margin:0 auto">
        <div class="card__icon"><i class="bi bi-shield-lock"></i></div>
        <h2 class="card__title">Sign in to the portal</h2>
        <p class="card__text" style="margin-bottom:28px">Access for Airawat members and partners only.</p>

        <form onsubmit="return false;">
          <div class="field">
            <label for="l-email">Email or member ID</label>
            <input type="text" id="l-email" name="email" placeholder="you@airawat.org" autocomplete="username" required>
          </div>
          <div class="field">
            <label for="l-pass">Password</label>
            <input type="password" id="l-pass" name="password" placeholder="••••••••" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn--solid" style="width:100%"><i class="bi bi-box-arrow-in-right"></i> &nbsp;Sign in</button>
        </form>

        <p class="muted" style="margin-top:22px"><a class="link-arrow" href="mailto:office@airawat.org?subject=Member%20portal%20—%20password%20reset">Forgot password? <i class="bi bi-arrow-up-right"></i></a></p>
        <p class="muted" style="margin-top:14px">Not a member yet? <a class="link-arrow" href="contact.html">Request access <i class="bi bi-arrow-up-right"></i></a></p>
      </div>
    </section></div>

  </main>
  <div id="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
